<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">   
    <title>Dev Currency | Conversor de Moedas</title>
</head>
<body>
    <main class="flex">
        <section class="flex">
            <div class="container flex">
                <div class="titulo flex">
                    <span>💱</span>
                    <div class="logo">
                        <h1>Dev Currency</h1>
                        <p>Conversor de moedas</p>
                    </div>
                </div>
                <div class="border">
                    <div class="container-converte">
                        <div class="converte-top flex">
                            <div class="seletores-moedas flex">
                                <div class="moedas-icon"><img src="https://flagcdn.com/br.svg" width="30" alt="Brasil">BRL</div>
                                <div class="moedas flex">
                                    <div class="dropdown-arrow"><img src="img/down.png" alt="abrir seleção de moedas"/></div>
                                </div>
                            </div>
                            <input type="text" class="input-converte" placeholder="0,00"/>
                        </div>
                    </div>
                </div>
                <div class="divisor flex">
                    <div class="btn-converter flex">
                        <img src="./img/arrows.png" alt="botao inverter selecao de moedas">
                    </div>
                </div>
                <div class="border">
                    <div class="container-converte">
                        <div class="converte-top flex">
                            <div class="seletores-moedas flex">
                                <div class="moedas-icon"><img src="https://flagcdn.com/us.svg" width="30" alt="Stados Unidos">USD</div>
                                <div class="moedas flex">
                                    <div class="dropdown-arrow"><img src="img/down.png" alt="abrir seleção de moedas"/></div>
                                </div>
                            </div>
                            <input type="text" class="input-converte" placeholder="0,00"/>
                        </div>
                    </div>
                </div>
                <button>Converter</button>
            </div>
        </section>
        <section class="flex">
            <div class="container-grafico">
                <div class="grafico-atual">
                    <h2 class="referencia">Últimos 7 dias</h2>
                    <p class="moedas-grafico">BRL / EUR</p>
                    <canvas id="grafico"></canvas>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
