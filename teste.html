<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .converter-card {
      background: white;
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .header {
      margin-bottom: 8px;
    }

    .header h2 {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .exchange-rate {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }

    .converter-container {
      position: relative;
    }

    /* Currency Input Box */
    .currency-box {
      background: #f8f8f8;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
    }

    .currency-box.top {
      padding-bottom: 28px;
    }

    .currency-box.bottom {
      padding-top: 28px;
      margin-bottom: 0;
    }

    /* Inverted Border Radius - TOP BOX */
    .currency-box.top::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 24px;
      background: white;
      border-radius: 24px 24px 0 0;
    }

    /* Inverted Border Radius - BOTTOM BOX */
    .currency-box.bottom::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 24px;
      background: white;
      border-radius: 0 0 24px 24px;
    }

    /* Currency Selector */
    .currency-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      cursor: pointer;
      width: fit-content;
    }

    .flag {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      overflow: hidden;
      background: white;
      border: 1px solid #e0e0e0;
    }

    .currency-code {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dropdown-arrow {
      font-size: 12px;
      color: #666;
    }

    /* Amount Input */
    .amount-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-size: 28px;
      font-weight: 600;
      color: #1a1a1a;
      text-align: right;
      padding: 8px 0;
    }

    .amount-input::placeholder {
      color: #ccc;
    }

    /* Conversion Button */
    .conversion-btn-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    .conversion-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #a4d831;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(164, 216, 49, 0.3);
      transition: all 0.3s ease;
    }

    .conversion-btn:hover {
      background: #95c922;
      transform: scale(1.05);
    }

    .conversion-btn:active {
      transform: scale(0.95);
    }

    .arrow-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .arrow-icon svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      background: #a4d831;
      color: #1a1a1a;
      border: none;
      border-radius: 16px;
      padding: 18px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      background: #95c922;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="converter-card">
    <div class="header">
      <h2>Sell AUD</h2>
      <p class="exchange-rate">1 AUD = 0.657 USD</p>
    </div>

    <div class="converter-container">
      <!-- Top Currency Box -->
      <div class="currency-box top">
        <div class="currency-selector">
          <div class="flag">🇦🇺</div>
          <div class="currency-code">
            AUD
            <span class="dropdown-arrow">▼</span>
          </div>
        </div>
        <input 
          type="text" 
          class="amount-input" 
          value="$10,129.82"
          placeholder="$0.00"
        >
      </div>

      <!-- Conversion Button -->
      <div class="conversion-btn-wrapper">
        <button class="conversion-btn">
          <div class="arrow-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M7 10l5 5 5-5H7z"/>
            </svg>
          </div>
        </button>
      </div>

      <!-- Bottom Currency Box -->
      <div class="currency-box bottom">
        <div class="currency-selector">
          <div class="flag">🇺🇸</div>
          <div class="currency-code">
            USD
            <span class="dropdown-arrow">▼</span>
          </div>
        </div>
        <input 
          type="text" 
          class="amount-input" 
          value="$6,786.43"
          placeholder="$0.00"
        >
      </div>
    </div>

    <!-- Submit Button -->
    <button class="submit-btn">
      Sell 10,129.82 AUD
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 12h14m-7-7l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <script>
    // Conversão automática
    const topInput = document.querySelectorAll('.amount-input')[0];
    const bottomInput = document.querySelectorAll('.amount-input')[1];
    const conversionBtn = document.querySelector('.conversion-btn');
    const submitBtn = document.querySelector('.submit-btn');

    const exchangeRate = 0.657;

    // Formatar número como moeda
    function formatCurrency(value) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
      }).format(value);
    }

    // Converter de AUD para USD
    function convertCurrency() {
      const audValue = parseFloat(topInput.value.replace(/[^0-9.]/g, ''));
      if (!isNaN(audValue)) {
        const usdValue = audValue * exchangeRate;
        bottomInput.value = formatCurrency(usdValue);
        updateSubmitButton(audValue);
      }
    }

    // Atualizar botão de submit
    function updateSubmitButton(value) {
      const formatted = new Intl.NumberFormat('en-US').format(value);
      submitBtn.innerHTML = `
        Sell ${formatted} AUD
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12h14m-7-7l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      `;
    }

    // Eventos
    topInput.addEventListener('input', convertCurrency);
    
    conversionBtn.addEventListener('click', () => {
      // Trocar valores
      const temp = topInput.value;
      topInput.value = bottomInput.value;
      bottomInput.value = temp;
      
      // Animar botão
      conversionBtn.style.transform = 'rotate(180deg)';
      setTimeout(() => {
        conversionBtn.style.transform = 'rotate(0deg)';
      }, 300);
    });

    submitBtn.addEventListener('click', () => {
      alert('Conversão realizada com sucesso!');
    });

    // Formatação inicial
    convertCurrency();
  </script>
</body>
</html>
